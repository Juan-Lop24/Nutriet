# ══════════════════════════════════════════════════════════════
#  NutriET — Configuración Railway
#  Railway detecta este archivo automáticamente
# ══════════════════════════════════════════════════════════════

[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"

[deploy]
startCommand = "gunicorn -c gunicorn.conf.py Nutriet.wsgi:application"
healthcheckPath = "/health/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
