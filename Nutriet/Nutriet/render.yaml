# ══════════════════════════════════════════════════════════════
#  NutriET — Configuración Render.com
# ══════════════════════════════════════════════════════════════

services:
  - type: web
    name: nutriet
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    startCommand: "gunicorn -c gunicorn.conf.py Nutriet.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: Nutriet.setting.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nutriet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nutriet-redis
          type: redis
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_VAPID_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: nutriet-db
    plan: free

  - name: nutriet-redis
    plan: free
    ipAllowList: []
