# ══════════════════════════════════════════════════════════════════════════════
#  NutriET — Configuración Nginx (servidor web / proxy reverso)
#  Ubicación sugerida: /etc/nginx/sites-available/nutriet
#  Activar: sudo ln -s /etc/nginx/sites-available/nutriet /etc/nginx/sites-enabled/
# ══════════════════════════════════════════════════════════════════════════════

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name tudominio.com www.tudominio.com;
    return 301 https://$host$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # ── SSL (Let's Encrypt con Certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Seguridad ─────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Límites ───────────────────────────────────────────────────────────────
    client_max_body_size 20M;    # Para subida de fotos de perfil
    keepalive_timeout 65;

    # ── Service Worker Firebase (debe tener Content-Type correcto) ───────────
    location = /firebase-messaging-sw.js {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "application/javascript; charset=UTF-8" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # ── Archivos estáticos (WhiteNoise los sirve, pero Nginx es más rápido) ──
    location /static/ {
        alias /ruta/a/tu/proyecto/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Archivos de media (fotos de perfil, etc.) ─────────────────────────────
    location /media/ {
        alias /ruta/a/tu/proyecto/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── App Django (Gunicorn) ─────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health/ {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }
}
