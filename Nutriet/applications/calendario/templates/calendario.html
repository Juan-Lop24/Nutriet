{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario — Nutriet</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
/* ═══════════════════════════════════════════════
   VARIABLES
═══════════════════════════════════════════════ */
:root {
  --pink:          #f50057;
  --pink-light:    #ff4081;
  --pink-glow:     rgba(245, 0, 87, 0.35);
  --pink-soft:     rgba(245, 0, 87, 0.1);
  --pink-subtle:   rgba(245, 0, 87, 0.05);
  --soft-yellow:   rgb(255, 249, 230);
  --hover-yellow:  #fff1c1;
  --bg:            linear-gradient(135deg, #fff9f0 0%, #fef0f5 55%, #f5f0ff 100%);
  --white:         #ffffff;
  --card-bg:       rgba(255, 255, 255, 0.85);
  --text-dark:     #1a1a2e;
  --text-muted:    #6c757d;
  --text-light:    #9ca3af;
  --border:        rgba(245, 0, 87, 0.1);
  --border-soft:   rgba(0, 0, 0, 0.06);
  --shadow-sm:     0 4px 16px rgba(0,0,0,0.06);
  --shadow-md:     0 10px 40px rgba(0,0,0,0.09);
  --shadow-lg:     0 20px 60px rgba(0,0,0,0.12);
  --shadow-pink:   0 8px 30px rgba(245,0,87,0.18);
  --primary-pink:  #f50057;
  --shadow-light:  rgba(0,0,0,0.08);
  --shadow-medium: rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ─── Manchas decorativas de fondo ─── */
body::before {
  content: '';
  position: fixed;
  top: -120px; right: -120px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(245,0,87,.07) 0%, transparent 68%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatOrb 10s ease-in-out infinite;
}

body::after {
  content: '';
  position: fixed;
  bottom: -100px; left: 80px;
  width: 450px; height: 450px;
  background: radial-gradient(circle, rgba(255,112,67,.05) 0%, transparent 65%);
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatOrb 13s ease-in-out infinite reverse;
}

@keyframes floatOrb {
  0%,100% { transform: translateY(0) scale(1); }
  50%     { transform: translateY(-30px) scale(1.04); }
}

    /* ============================================
      SIDEBAR
      ============================================ */

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 80px;
      background: linear-gradient(180deg, var(--soft-yellow) 0%, #fff8dc 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      box-shadow: 4px 0 20px var(--shadow-light);
      z-index: 1000;
      border-right: 2px solid rgba(245, 0, 87, 0.1);
    }

    .sidebar:hover {
      width: 260px;
      box-shadow: 6px 0 30px var(--shadow-medium);
    }

    .sidebar::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, transparent 0%, rgba(245, 0, 87, 0.02) 100%);
      pointer-events: none;
    }

    .sidebar .logo {
      width: 55px;
      margin: 25px auto 50px;
      display: block;
      transition: all 0.3s ease;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
    }

    .sidebar:hover .logo {
      transform: scale(1.1);
      filter: drop-shadow(0 6px 12px rgba(245, 0, 87, 0.3));
    }

    .menu {
      list-style: none;
      padding: 0;
      margin: 10px;
    }

    .menu li {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .menu li::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--primary-pink), rgba(245, 0, 87, 0.7));
      transition: width 0.3s ease;
      border-radius: 12px;
    }

    .menu li:hover::before { width: 4px; }
    .menu li:hover {
      background: var(--hover-yellow);
      transform: translateX(4px);
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 22px;
      text-decoration: none;
      width: 100%;
      color: var(--primary-pink);
      transition: all 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .menu i {
      font-size: 22px;
      min-width: 28px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .menu li:hover i {
      transform: scale(1.15);
      filter: drop-shadow(0 2px 4px rgba(245, 0, 87, 0.3));
    }

    .menu span {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
    }

    .sidebar:hover .menu span {
      opacity: 1;
      transform: translateX(0);
    }

    .logout {
      position: absolute;
      bottom: 25px;
      width: 100%;
      padding: 0 10px;
    }

    .logout button {
      all: unset;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 22px;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .logout button::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: radial-gradient(circle, rgba(245, 0, 87, 0.2), transparent);
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
      border-radius: 50%;
    }

    .logout button:hover::before {
      width: 300px;
      height: 300px;
    }

    .logout button:hover {
      background: linear-gradient(135deg, #ffe0e0 0%, #ffcdd2 100%);
      transform: translateX(4px);
    }

    .logout i {
      font-size: 22px;
      color: var(--primary-pink);
      min-width: 28px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .logout button:hover i { transform: rotate(15deg) scale(1.1); }

    .logout span {
      font-weight: 600;
      color: var(--text-dark);
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .sidebar:hover .logout span {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── SIDEBAR RESPONSIVE ── */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 1100;
      background: linear-gradient(135deg, var(--primary-pink), var(--pink-light));
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(245, 0, 87, 0.35);
      transition: transform .2s;
    }
    .sidebar-toggle:hover { transform: scale(1.08); }
    .sidebar-toggle i { font-size: 20px; color: #fff; }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 16, 37, 0.55);
      backdrop-filter: blur(3px);
      z-index: 999;
    }
    .sidebar-backdrop.open { display: block; }

    @media (max-width: 768px) {
      .sidebar-toggle { display: flex; }

      .sidebar {
        transform: translateX(-100%);
        width: 260px !important;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex !important;
        flex-direction: column !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        height: 100vh !important;
      }
      .sidebar:hover { width: 260px; }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar.open .menu span,
      .sidebar.open .logout span {
        opacity: 1;
        transform: translateX(0);
      }

      .logout {
        position: relative !important;
        bottom: auto !important;
        margin-top: auto !important;
        width: 100% !important;
        padding: 16px 10px 40px !important;
        flex-shrink: 0 !important;
      }

      main {
        margin-left: 0 !important;
        padding-top: 70px !important;
      }
    }
/* ═══════════════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════════════ */
main {
  margin-left: 100px;
  padding: 40px 40px 72px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════════════ */
.page-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 36px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
  gap: 20px;
  flex-wrap: wrap;
  animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}

.page-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--pink);
  margin-bottom: 10px;
  background: var(--pink-soft);
  padding: 5px 13px;
  border-radius: 100px;
  border: 1px solid rgba(245,0,87,.18);
  width: fit-content;
}

.page-label .dot {
  width: 5px; height: 5px;
  background: var(--pink);
  border-radius: 50%;
  animation: pulseDot 2s ease-in-out infinite;
}

@keyframes pulseDot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .35; transform: scale(.55); }
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.6rem;
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.1;
  margin: 0;
}

.page-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--pink), #ff7043);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.page-subtitle {
  margin-top: 8px;
  font-size: .85rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* Stats pills */
.header-stats { display: flex; gap: 12px; flex-wrap: wrap; }

.stat-pill {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: .8rem;
  font-weight: 600;
  color: var(--text-muted);
  box-shadow: var(--shadow-sm);
  transition: all .25s ease;
  cursor: default;
}

.stat-pill:hover {
  border-color: var(--pink);
  color: var(--text-dark);
  box-shadow: var(--shadow-pink);
  transform: translateY(-2px);
}

.stat-pill strong { color: var(--text-dark); font-weight: 800; }

.stat-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 8px var(--pink-glow);
  animation: pulseDot 2s ease-in-out infinite;
}

.stat-pill i { color: var(--pink); font-size: .75rem; }

/* ═══════════════════════════════════════════════
   CALENDAR CONTAINER
═══════════════════════════════════════════════ */
.cal-wrap {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 36px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md), 0 0 0 1px rgba(255,255,255,.7) inset;
  animation: fadeUp .6s .08s cubic-bezier(.22,1,.36,1) both;
  transition: box-shadow .3s ease, transform .3s ease;
}

.cal-wrap:hover {
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.8) inset;
}

/* Borde top con gradiente */
.cal-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--pink), #ff4081, #ff7043, var(--pink));
  background-size: 200% 100%;
  animation: gradientShift 4s ease infinite;
}

@keyframes gradientShift {
  0%,100% { background-position: 0% 50%; }
  50%     { background-position: 100% 50%; }
}

/* Orbe decorativa top-right */
.cal-wrap::after {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(245,0,87,.07), transparent 70%);
  pointer-events: none;
  border-radius: 50%;
}

.cal-orbe-bottom {
  position: absolute;
  bottom: -40px; left: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(255,112,67,.05), transparent 70%);
  pointer-events: none;
  border-radius: 50%;
}

/* ═══════════════════════════════════════════════
   FULLCALENDAR OVERRIDES — LIGHT THEME
═══════════════════════════════════════════════ */
.fc { font-family: 'Montserrat', sans-serif !important; color: var(--text-dark) !important; }

.fc .fc-toolbar {
  margin-bottom: 28px !important;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.fc .fc-toolbar-title {
  font-family: 'Playfair Display', serif !important;
  font-size: 1.6rem !important;
  font-weight: 700 !important;
  color: var(--text-dark) !important;
  letter-spacing: -.01em;
  text-transform: capitalize;
}

/* Botones FC */
.fc .fc-button {
  background: var(--white) !important;
  border: 1.5px solid var(--border) !important;
  color: var(--text-muted) !important;
  border-radius: 10px !important;
  padding: 8px 15px !important;
  font-size: .78rem !important;
  font-weight: 700 !important;
  font-family: 'Montserrat', sans-serif !important;
  letter-spacing: .03em !important;
  transition: all .22s ease !important;
  box-shadow: var(--shadow-sm) !important;
  text-shadow: none !important;
}

.fc .fc-button:hover {
  background: var(--pink-soft) !important;
  border-color: var(--pink) !important;
  color: var(--pink) !important;
  transform: translateY(-1px) !important;
  box-shadow: 0 4px 14px rgba(245,0,87,.12) !important;
}

.fc .fc-button:focus {
  box-shadow: 0 0 0 3px rgba(245,0,87,.15) !important;
  outline: none !important;
}

.fc .fc-button-active,
.fc .fc-button-primary:not(:disabled).fc-button-active {
  background: linear-gradient(135deg, var(--pink), #ff4081) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: var(--shadow-pink) !important;
}

/* Cabecera días */
.fc .fc-col-header-cell {
  background: rgba(245,0,87,.03) !important;
  padding: 12px 0 !important;
}
.fc .fc-col-header-cell-cushion {
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .1em !important;
  text-transform: uppercase !important;
  color: var(--text-muted) !important;
  text-decoration: none !important;
  padding: 6px 4px !important;
}

/* Celdas */
.fc .fc-daygrid-day {
  background: transparent !important;
  border-color: rgba(0,0,0,.05) !important;
  transition: background .18s ease;
}
.fc .fc-daygrid-day:hover {
  background: var(--pink-subtle) !important;
  cursor: pointer;
}
.fc .fc-daygrid-day-number {
  font-size: .8rem !important;
  font-weight: 600 !important;
  color: var(--text-muted) !important;
  text-decoration: none !important;
  padding: 8px 10px !important;
  transition: color .2s;
}
.fc .fc-daygrid-day:hover .fc-daygrid-day-number { color: var(--text-dark) !important; }

/* Hoy */
.fc .fc-day-today { background: rgba(245,0,87,.06) !important; }
.fc .fc-day-today .fc-daygrid-day-number {
  color: var(--pink) !important;
  font-weight: 800 !important;
  background: var(--pink-soft);
  border-radius: 50%;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 12px rgba(245,0,87,.2);
}

/* Grid lines */
.fc .fc-scrollgrid,
.fc .fc-scrollgrid-section > td { border-color: rgba(0,0,0,.05) !important; }
.fc .fc-scrollgrid-sync-table td,
.fc .fc-scrollgrid-sync-table th { border-color: rgba(0,0,0,.04) !important; }

/* ── EVENTOS ── */
.fc .fc-daygrid-event {
  border: none !important;
  border-radius: 8px !important;
  margin: 2px 4px !important;
  padding: 0 !important;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
  transition: transform .2s, box-shadow .2s !important;
}
.fc .fc-daygrid-event:hover {
  transform: translateX(3px) scale(1.01) !important;
  box-shadow: var(--shadow-pink) !important;
  z-index: 10;
}
.fc .fc-event-main {
  padding: 5px 9px !important;
  display: flex; align-items: center; gap: 5px;
}
.ev-normal .fc-event-main {
  background: linear-gradient(135deg, rgba(245,0,87,.18), rgba(245,0,87,.06)) !important;
  border-left: 3px solid var(--pink) !important;
}
.fc .fc-event-title,
.fc .fc-event-time {
  font-size: .72rem !important;
  font-weight: 700 !important;
  color: var(--text-dark) !important;
  white-space: nowrap !important;
  overflow: hidden; text-overflow: ellipsis;
}
.fc .fc-event-time { color: var(--pink) !important; opacity: 1 !important; }

.evento-vencido .fc-event-main {
  background: linear-gradient(135deg, rgba(120,120,120,.12), rgba(120,120,120,.04)) !important;
  border-left: 3px solid #aaa !important;
}
.evento-vencido .fc-event-title,
.evento-vencido .fc-event-time { color: var(--text-muted) !important; }

.fc .fc-list-event-dot { border-color: var(--pink) !important; }

/* ═══════════════════════════════════════════════
   MODAL — LIGHT THEME
═══════════════════════════════════════════════ */
.modal-content {
  background: var(--white) !important;
  border: 1px solid var(--border) !important;
  border-radius: 24px !important;
  box-shadow: var(--shadow-lg) !important;
  overflow: hidden;
}

.modal-header {
  background: transparent !important;
  border-bottom: 1px solid var(--border) !important;
  padding: 26px 30px !important;
  position: relative;
}

/* Barra top del modal */
.modal-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--pink), #ff7043, var(--pink));
  background-size: 200% 100%;
  animation: gradientShift 3s ease infinite;
}

.modal-title {
  font-family: 'Playfair Display', serif !important;
  font-size: 1.15rem !important;
  font-weight: 700 !important;
  color: var(--text-dark) !important;
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-title::before {
  content: '';
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--pink);
  box-shadow: 0 0 8px var(--pink-glow);
  animation: pulseDot 2s ease-in-out infinite;
  flex-shrink: 0;
}

/* Botón cerrar */
.btn-close {
  width: 34px !important; height: 34px !important;
  padding: 0 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  border-radius: 50% !important;
  border: 1.5px solid var(--border) !important;
  background: rgba(245,0,87,.06) !important;
  background-image: none !important;
  transition: all .25s !important;
  opacity: 1 !important;
  position: relative;
}
.btn-close::before, .btn-close::after {
  content: '';
  position: absolute;
  width: 13px; height: 1.5px;
  background: var(--text-muted);
  border-radius: 2px;
  transition: all .25s;
}
.btn-close::before { transform: rotate(45deg); }
.btn-close::after  { transform: rotate(-45deg); }
.btn-close:hover {
  border-color: var(--pink) !important;
  background: var(--pink-soft) !important;
  transform: rotate(90deg) !important;
}
.btn-close:hover::before,
.btn-close:hover::after { background: var(--pink); }

.modal-body { padding: 28px 30px !important; background: transparent !important; }

/* Form */
.form-label {
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .09em !important;
  text-transform: uppercase !important;
  color: var(--text-muted) !important;
  margin-bottom: 8px !important;
}

.form-control {
  background: rgba(245,0,87,.03) !important;
  border: 1.5px solid var(--border) !important;
  border-radius: 13px !important;
  color: var(--text-dark) !important;
  font-family: 'Montserrat', sans-serif !important;
  font-size: .9rem !important;
  font-weight: 500 !important;
  padding: 13px 17px !important;
  transition: all .25s !important;
}
.form-control:focus {
  background: var(--pink-subtle) !important;
  border-color: var(--pink) !important;
  box-shadow: 0 0 0 3px rgba(245,0,87,.1) !important;
  color: var(--text-dark) !important;
  outline: none !important;
}
.form-control::placeholder { color: rgba(108,117,125,.45) !important; }

.modal-footer {
  padding: 20px 30px !important;
  background: rgba(245,0,87,.02) !important;
  border-top: 1px solid var(--border) !important;
  gap: 10px;
}

/* Botones modal */
.btn-guardar {
  background: linear-gradient(135deg, var(--pink), #ff4081) !important;
  border: none !important;
  border-radius: 13px !important;
  color: #fff !important;
  font-family: 'Montserrat', sans-serif !important;
  font-size: .85rem !important;
  font-weight: 700 !important;
  padding: 12px 26px !important;
  transition: all .25s !important;
  box-shadow: var(--shadow-pink) !important;
  position: relative; overflow: hidden; letter-spacing: .02em;
}
.btn-guardar:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 12px 36px rgba(245,0,87,.28) !important;
  filter: brightness(1.06);
}
.btn-guardar::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 0; height: 0;
  background: rgba(255,255,255,.2);
  border-radius: 50%;
  transform: translate(-50%,-50%);
  transition: width .5s, height .5s;
}
.btn-guardar:active::after { width: 200px; height: 200px; }

.btn-eliminar {
  background: transparent !important;
  border: 1.5px solid rgba(220,53,69,.2) !important;
  border-radius: 13px !important;
  color: #dc3545 !important;
  font-family: 'Montserrat', sans-serif !important;
  font-size: .85rem !important;
  font-weight: 700 !important;
  padding: 12px 22px !important;
  transition: all .25s !important;
}
.btn-eliminar:hover {
  background: rgba(220,53,69,.08) !important;
  border-color: #dc3545 !important;
  transform: translateY(-2px) !important;
  box-shadow: 0 4px 14px rgba(220,53,69,.12) !important;
}

/* ─── Modal alerta ─── */
#modalAlertaActividad .modal-body { text-align: center; padding: 38px 28px !important; }
.alerta-icon { font-size: 3rem; margin-bottom: 16px; display: block; animation: shake .5s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-5px); }
  40%,80%  { transform: translateX(5px); }
}
.alerta-msg { font-size: .95rem; font-weight: 500; color: var(--text-muted); line-height: 1.7; }
.alerta-msg b { color: var(--text-dark); font-weight: 700; }

#modalAlertaActividad .modal-footer .btn {
  background: linear-gradient(135deg, var(--pink), #ff4081) !important;
  border: none !important;
  border-radius: 13px !important;
  color: #fff !important;
  font-family: 'Montserrat', sans-serif !important;
  font-weight: 700 !important;
  padding: 12px 32px !important;
  transition: all .25s !important;
  box-shadow: var(--shadow-pink) !important;
}
#modalAlertaActividad .modal-footer .btn:hover {
  transform: translateY(-2px) !important;
  box-shadow: 0 12px 36px rgba(245,0,87,.28) !important;
}

/* ═══════════════════════════════════════════════
   FLATPICKR — LIGHT THEME
═══════════════════════════════════════════════ */
.flatpickr-calendar {
  background: var(--white) !important;
  border: 1px solid var(--border) !important;
  border-radius: 18px !important;
  box-shadow: var(--shadow-lg) !important;
  font-family: 'Montserrat', sans-serif !important;
}
.flatpickr-month, .flatpickr-weekdays { background: transparent !important; }
.flatpickr-current-month, .flatpickr-monthDropdown-months { color: var(--text-dark) !important; font-family: 'Montserrat', sans-serif !important; }
.flatpickr-weekday { color: var(--text-muted) !important; font-weight: 700 !important; }
.flatpickr-day { color: var(--text-dark) !important; border-radius: 8px !important; }
.flatpickr-day:hover { background: var(--pink-soft) !important; color: var(--pink) !important; border-color: transparent !important; }
.flatpickr-day.selected, .flatpickr-day.selected:hover {
  background: var(--pink) !important;
  border-color: var(--pink) !important;
  color: #fff !important;
  box-shadow: var(--shadow-pink) !important;
}
.flatpickr-day.today { border-color: var(--pink) !important; color: var(--pink) !important; font-weight: 700 !important; }
.flatpickr-time input { color: var(--text-dark) !important; }

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #f5f5f5; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--pink), #ff4081); border-radius: 10px; }

/* ═══════════════════════════════════════════════
   ANIMACIONES
═══════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media (max-width: 768px) {
  main { margin-left: 90px; padding: 24px 18px 48px; }
  .page-header { flex-direction: column; align-items: flex-start; }
  .page-title { font-size: 2rem; }
  .cal-wrap { padding: 20px; }
  .header-stats { flex-wrap: wrap; }
}

* { transition: background-color .25s ease, color .25s ease; }
  </style>
</head>
<body>

<!-- ═══ MODAL ALERTA ═══ -->
<div class="modal fade" id="modalAlertaActividad" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Actividad por terminar</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <span class="alerta-icon">⚠️</span>
        <p class="alerta-msg" id="mensajeAlertaActividad"></p>
      </div>
      <div class="modal-footer justify-content-center">
        <button class="btn" data-bs-dismiss="modal">Entendido</button>
      </div>
    </div>
  </div>
</div>

<!-- Botón hamburguesa (solo móvil) -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Menú">
  <i class="fas fa-bars" id="toggleIcon"></i>
</button>

<!-- Backdrop -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- ═══ SIDEBAR ═══ -->
<aside class="sidebar">
  <img src="{% static 'images/logo.png' %}" class="logo" alt="Nutriet">
  <ul class="menu">
    <li><a href="{% url 'main' %}"><i class="fas fa-home"></i><span>Inicio</span></a></li>
    <li><a href="{% url 'explorar_recetas' %}"><i class="fas fa-apple-alt"></i><span>Recetas</span></a></li>
    <li><a href="{% url 'seguimiento:seguimiento' %}"><i class="fas fa-chart-line"></i><span>Seguimiento</span></a></li>
    <li><a href="{% url 'calendario' %}"><i class="fas fa-calendar-alt"></i><span>Calendario</span></a></li>
    <li><a href="{% url 'perfil' %}"><i class="fas fa-cog"></i><span>Configuración</span></a></li>
  </ul>
  <div class="logout">
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit">
        <i class="fas fa-right-from-bracket"></i>
        <span>Cerrar sesión</span>
      </button>
    </form>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main>

  <div class="page-header">
    <div>
      <div class="page-label"><span class="dot"></span> Planificación</div>
      <h1 class="page-title">Mi <em>Calendario</em></h1>
      <p class="page-subtitle">Organiza tus comidas, rutinas y actividades del día</p>
    </div>

    <div class="header-stats">
      <div class="stat-pill">
        <span class="stat-dot"></span>
        <span>Hoy: <strong id="hoy-fecha"></strong></span>
      </div>
      <div class="stat-pill">
        <i class="fas fa-calendar-check"></i>
        <span><strong id="total-eventos">0</strong> actividades</span>
      </div>
    </div>
  </div>

  <div class="cal-wrap">
    <div class="cal-orbe-bottom"></div>
    <div id="calendar"></div>
  </div>

</main>

<!-- ═══ MODAL EVENTO ═══ -->
<div class="modal fade" id="modalEvento" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nueva actividad</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="eventoId">
        <div class="mb-4">
          <label class="form-label">Actividad</label>
          <input type="text" class="form-control" id="titulo" placeholder="Ej. Correr 30 min...">
        </div>
        <div class="mb-4">
          <label class="form-label">Hora</label>
          <input type="text" id="hora" class="form-control" placeholder="Selecciona una hora">
        </div>
        <div class="mb-2">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-control" id="fecha">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-eliminar" id="eliminarEvento">
          <i class="fas fa-trash-alt" style="font-size:.8rem;"></i> Eliminar
        </button>
        <button class="btn btn-guardar" id="guardarEvento">
          <i class="fas fa-check" style="font-size:.8rem;"></i> Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Fecha hoy ── */
(function(){
  const el = document.getElementById('hoy-fecha');
  const now = new Date();
  el.textContent = now.toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' });
})();

/* ── Calendario ── */
document.addEventListener('DOMContentLoaded', function() {

  const calendarEl  = document.getElementById('calendar');
  const modalEvento = new bootstrap.Modal(document.getElementById('modalEvento'));
  const tituloInput = document.getElementById('titulo');
  const horaInput   = document.getElementById('hora');
  const fechaInput  = document.getElementById('fecha');
  const eventoId    = document.getElementById('eventoId');
  const totalEl     = document.getElementById('total-eventos');

  flatpickr("#hora", {
    enableTime: true, noCalendar: true,
    dateFormat: "h:i K", time_24hr: false,
    minuteIncrement: 1, locale: "es",
  });

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'es',
    selectable: true,
    editable: true,
    events: '/calendario/eventos/',
    height: 'auto',

    headerToolbar: {
      left:   'prev,next today',
      center: 'title',
      right:  'dayGridMonth,timeGridWeek,listWeek'
    },

    buttonText: { today:'Hoy', month:'Mes', week:'Semana', list:'Lista' },
    eventTimeFormat: { hour:'numeric', minute:'2-digit', hour12:true },

    eventDidMount(info) {
      const now  = new Date();
      const date = new Date(info.event.start);
      info.el.classList.add(date < now ? 'evento-vencido' : 'ev-normal');
    },

    dateClick(info) {
      document.getElementById('modalEvento').querySelector('.modal-title').textContent = 'Nueva actividad';
      fechaInput.value  = info.dateStr;
      eventoId.value    = '';
      tituloInput.value = '';
      horaInput.value   = '';
      document.getElementById('eliminarEvento').style.display = 'none';
      modalEvento.show();
    },

    eventClick(info) {
      document.getElementById('modalEvento').querySelector('.modal-title').textContent = 'Editar actividad';
      eventoId.value    = info.event.id;
      tituloInput.value = info.event.title;
      fechaInput.value  = info.event.startStr.split('T')[0];
      if (info.event.start) {
        const h = info.event.start.getHours().toString().padStart(2,'0');
        const m = info.event.start.getMinutes().toString().padStart(2,'0');
        horaInput.value = `${h}:${m}`;
      }
      document.getElementById('eliminarEvento').style.display = '';
      modalEvento.show();
    },

    eventsSet(events) { totalEl.textContent = events.length; }
  });

  calendar.render();

  document.getElementById('guardarEvento').addEventListener('click', function() {
    const datos = {
      id:    eventoId.value,
      title: tituloInput.value,
      date:  fechaInput.value,
      time:  horaInput.value || null
    };
    const url = datos.id ? `/calendario/editar/${datos.id}/` : '/calendario/agregar/';
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
      body: JSON.stringify(datos)
    }).then(() => { calendar.refetchEvents(); modalEvento.hide(); });
  });

  document.getElementById('eliminarEvento').addEventListener('click', function() {
    if (eventoId.value) {
      fetch(`/calendario/eliminar/${eventoId.value}/`, {
        method: 'DELETE',
        headers: { 'X-CSRFToken': '{{ csrf_token }}' }
      }).then(() => { calendar.refetchEvents(); modalEvento.hide(); });
    }
  });

  fetch("/calendario/eventos/")
    .then(r => r.json())
    .then(eventos => {
      const hoy = new Date();
      hoy.setHours(0,0,0,0);
      const vencidos = eventos.filter(ev => {
        const d = new Date(ev.start);
        d.setHours(0,0,0,0);
        return d < hoy;
      });
      if (vencidos.length) {
        const nombres = vencidos.map(e => `<b>${e.title}</b>`).join(', ');
        document.getElementById('mensajeAlertaActividad').innerHTML =
          `${vencidos.length > 1 ? 'Las actividades' : 'La actividad'} ${nombres} ya ${vencidos.length > 1 ? 'pasaron' : 'pasó'}.`;
        new bootstrap.Modal(document.getElementById('modalAlertaActividad')).show();
      }
    });

  document.addEventListener("hidden.bs.modal", function() {
    document.querySelectorAll(".modal-backdrop").forEach(el => el.remove());
    document.body.classList.remove("modal-open");
    document.body.style.removeProperty("overflow");
    document.body.style.removeProperty("padding-right");
  });
});

window.addEventListener('pageshow', function(event) {
  if (event.persisted || performance.getEntriesByType("navigation")[0]?.type === "back_forward") {
    window.location.reload();
  }
});
</script>
<script>
  const sidebar  = document.querySelector('.sidebar');
  const toggle   = document.getElementById('sidebarToggle');
  const backdrop = document.getElementById('sidebarBackdrop');
  const icon     = document.getElementById('toggleIcon');
  function openSidebar()  { sidebar.classList.add('open'); backdrop.classList.add('open'); icon.className = 'fas fa-times'; document.body.style.overflow = 'hidden'; }
  function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('open'); icon.className = 'fas fa-bars'; document.body.style.overflow = ''; }
  toggle.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
  backdrop.addEventListener('click', closeSidebar);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && sidebar.classList.contains('open')) closeSidebar(); });
</script>
</body>
</html>
