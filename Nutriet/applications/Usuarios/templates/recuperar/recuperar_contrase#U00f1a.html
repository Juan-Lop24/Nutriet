{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Contraseña - Nutriet</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #fef4f5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      display: flex;
      width: 100%;
      max-width: 1200px;
      background: white;
      border-radius: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.15);
    }

    .form-section {
      flex: 1;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .volver {
      background: linear-gradient(135deg, #ff1660 0%, #e91e63 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 22, 96, 0.3);
    }

    .volver:hover {
      transform: translateX(-5px);
      box-shadow: 0 6px 20px rgba(255, 22, 96, 0.4);
    }

    .volver::before {
      content: '←';
      font-size: 18px;
      font-weight: bold;
    }

    h2 {
      color: #ff1660;
      margin-bottom: 15px;
      font-size: 36px;
      font-weight: 700;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 15px;
      font-weight: 400;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 600;
      margin-bottom: 8px;
      margin-top: 15px;
      color: #333;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #fafafa;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: #ff1660;
      background: white;
      box-shadow: 0 0 0 4px rgba(255, 22, 96, 0.1);
    }

    input[type="email"]:hover {
      border-color: #ff1660;
      background: white;
    }

    .enviar-btn {
      background: linear-gradient(135deg, #ffd54f 0%, #ffca28 100%);
      color: #000;
      font-weight: 600;
      font-size: 16px;
      border: none;
      padding: 16px 20px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 202, 40, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .enviar-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(255, 202, 40, 0.4);
      background: linear-gradient(135deg, #ffca28 0%, #ffd54f 100%);
    }

    .enviar-btn:active {
      transform: translateY(0);
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      color: #999;
      font-size: 14px;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .google-btn {
      background: white;
      color: #666;
      font-weight: 500;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .google-btn:hover {
      border-color: #4285f4;
      background: #f8f9fa;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(66, 133, 244, 0.2);
    }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .links {
      margin-top: 25px;
      text-align: center;
    }

    .links a {
      color: #ff1660;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .links a:hover {
      color: #e91e63;
      text-decoration: underline;
    }

    .links p {
      color: #666;
      margin-bottom: 10px;
      font-size: 14px;
    }

    /* Logo Section */
    .logo-section {
      flex: 1;
      background: linear-gradient(135deg, #ff1660 0%, #ff6b9d 50%, #ffb366 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }

    .logo-section::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      top: -100px;
      right: -100px;
    }

    .logo-section::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      bottom: -50px;
      left: -50px;
    }

    .logo-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 30px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      z-index: 1;
      transition: transform 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .logo-card:hover {
      transform: scale(1.05);
    }

    .logo-image {
      width: 400px;
      height: 400px;
      margin-bottom: 25px;
      animation: float 3s ease-in-out infinite;
      border-radius: 10%;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 700;
      color: #000;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .brand-tagline {
      font-size: 14px;
      color: #666;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Animations */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-section > * {
      animation: fadeIn 0.6s ease-out backwards;
    }

    .form-section > *:nth-child(1) { animation-delay: 0.1s; }
    .form-section > *:nth-child(2) { animation-delay: 0.2s; }
    .form-section > *:nth-child(3) { animation-delay: 0.3s; }
    .form-section > *:nth-child(4) { animation-delay: 0.4s; }

    /* Responsive Design */
    @media (max-width: 968px) {
      .container {
        flex-direction: column;
      }

      .logo-section {
        order: -1;
        padding: 40px;
        min-height: 300px;
      }

      .form-section {
        padding: 40px 30px;
      }

      h2 {
        font-size: 28px;
      }

      .logo-card {
        padding: 40px 30px;
      }
    }

    @media (max-width: 480px) {
      .form-section {
        padding: 30px 20px;
      }

      h2 {
        font-size: 24px;
      }

      .volver {
        padding: 10px 20px;
        font-size: 13px;
      }
    }

    /* Loading animation */
    .loading {
      pointer-events: none;
      opacity: 0.6;
      position: relative;
    }

    .loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Form Section -->
    <div class="form-section">
      <a href="{% url 'login' %}" style="text-decoration: none;">
        <button class="volver">volver</button>
      </a>

      <h2>Recuperar Contraseña</h2>
      <p class="subtitle">Ingresa tu correo electrónico para enviarte un código de verificación</p>

      <form method="POST" action="{% url 'send_verification_code' %}" id="recoveryForm">
        {% csrf_token %}
        
        <label for="email">Correo</label>
        <div class="input-wrapper">
          <input 
            type="email" 
            name="email" 
            id="email" 
            placeholder="ejemplo@correo.com" 
            required 
            autocomplete="email"
          />
        </div>

        <button type="submit" class="enviar-btn" id="submitBtn">
          Enviar código
        </button>
      </form>

      <div class="divider">Or</div>

      <div class="links">
        <p>¿No tienes una cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
        <p><a href="{% url 'login' %}">Volver al inicio de sesión</a></p>
      </div>
    </div>

    <!-- Logo Section -->

          <div class="logo-section">
            <img src="{% static 'images/logo.png' %}" alt="Nutriet logo" class="logo-image">
            <div class="brand-text">
            </div>
        </div>
  </div>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    // Form validation and loading state
    const form = document.getElementById('recoveryForm');
    const submitBtn = document.getElementById('submitBtn');
    const emailInput = document.getElementById('email');

    form.addEventListener('submit', function(e) {
      // Add loading state
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'Enviando...';
    });

    // Input animation
    emailInput.addEventListener('focus', function() {
      this.parentElement.style.transform = 'scale(1.02)';
    });

    emailInput.addEventListener('blur', function() {
      this.parentElement.style.transform = 'scale(1)';
    });

    // Display Django messages
    {% for message in messages %}
      {% if message.tags == 'error' %}
        Swal.fire({
          icon: 'error',
          title: '¡Error!',
          text: "{{ message }}",
          confirmButtonColor: '#ff1660',
          confirmButtonText: 'Entendido'
        }).then(() => {
          submitBtn.classList.remove('loading');
          submitBtn.textContent = 'Enviar código';
        });
      {% elif message.tags == 'success' %}
        Swal.fire({
          icon: 'success',
          title: '¡Código enviado!',
          text: "{{ message }}",
          confirmButtonColor: '#ff1660',
          confirmButtonText: 'Continuar'
        });
      {% endif %}
    {% endfor %}
  </script>
</body>
</html>
