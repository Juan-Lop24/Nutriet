<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Notificaciones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex;
            justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%; max-width: 400px; padding: 40px;
        }
        h1 { color: #667eea; margin-bottom: 30px; text-align: center; font-size: 1.8em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 5px; font-size: 1em; transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 5px rgba(102,126,234,0.3); }
        .btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 5px;
            font-size: 1em; font-weight: 600; cursor: pointer; transition: transform 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #f5c6cb; }
        .footer { text-align: center; margin-top: 20px; color: #666; }
        .footer a { color: #667eea; text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }
        .icon { font-size: 2.5em; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔔</div>
        <h1>Registro</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required placeholder="Tu nombre de usuario">
            </div>
            <div class="form-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" required placeholder="tu@correo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Contraseña segura">
            </div>
            <div class="form-group">
                <label for="password_confirm">Confirmar Contraseña:</label>
                <input type="password" id="password_confirm" name="password_confirm" required placeholder="Repite tu contraseña">
            </div>
            <button type="submit" class="btn">Crear Cuenta</button>
        </form>

        <div class="footer">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </div>
    </div>

    <!-- OneSignal SDK v16 (reemplaza Firebase) -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        const ONESIGNAL_APP_ID = "{{ ONESIGNAL_APP_ID }}";

        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: ONESIGNAL_APP_ID,
                promptOptions: { autoPrompt: false },
            });
        });

        const form       = document.querySelector('form');
        const submitBtn  = form.querySelector('button[type="submit"]');
        let tokenRegistrado = false;

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                document.cookie.split(';').forEach(cookie => {
                    cookie = cookie.trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    }
                });
            }
            return cookieValue;
        }

        async function solicitarPermisoYPlayerId() {
            try {
                await OneSignal.Notifications.requestPermission();
                if (!OneSignal.Notifications.permission) return null;
                const playerId = OneSignal.User.PushSubscription.id;
                return playerId || null;
            } catch (err) {
                console.error('Error obteniendo Player ID de OneSignal', err);
                return null;
            }
        }

        async function enviarTokenAlServidor(playerId) {
            const csrftoken = getCookie('csrftoken');
            const res = await fetch('/notificaciones/api/guardar-token-fcm/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken,
                },
                body: JSON.stringify({ token: playerId }),
            });
            return res.ok;
        }

        form.addEventListener('submit', async function(e) {
            if (tokenRegistrado) return; // ya autorizado, dejar pasar
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Solicitando permiso...';

            const playerId = await solicitarPermisoYPlayerId();
            console.log('OneSignal Player ID (registro):', playerId);

            if (!playerId) {
                // Si no se obtuvo el Player ID, se crea la cuenta igual
                // (el usuario puede activar notificaciones después desde el panel)
                tokenRegistrado = true;
                form.submit();
                return;
            }

            const ok = await enviarTokenAlServidor(playerId);
            console.log('Registro Player ID OK:', ok);

            tokenRegistrado = true;
            form.submit();
        });
    </script>
</body>
</html>
