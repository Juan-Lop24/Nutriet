{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generando tu dieta… — NUTRIET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--pink:#E8175D;--pink-soft:#fce4ef;--pink-mid:#f5a8c8;--cream:#FAF5EF;--text:#1C1C1E;--muted:#7a6f6a;--border:#eeddd4}
        body{font-family:"DM Sans",sans-serif;background:var(--cream);
             background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:28px 28px;
             min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
             overflow:hidden}

        /* LOGO */
        .logo{font-family:"Syne",sans-serif;font-weight:800;font-size:1.4rem;color:var(--pink);
              letter-spacing:-.03em;position:fixed;top:22px;left:28px}

        /* CARD */
        .card{background:white;border:1px solid var(--pink-mid);border-radius:22px;
              padding:48px 52px;display:flex;flex-direction:column;align-items:center;gap:24px;
              box-shadow:0 8px 40px rgba(232,23,93,.1);
              animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;
              max-width:420px;width:90%}
        @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}

        /* SPINNER */
        .sp-wrap{position:relative;width:88px;height:88px;display:flex;align-items:center;justify-content:center}
        .ring{position:absolute;inset:0;border:5px solid var(--pink-soft);border-top:5px solid var(--pink);
              border-radius:50%;animation:spin .95s linear infinite}
        .ring2{position:absolute;inset:13px;border:3px solid transparent;
               border-bottom:3px solid rgba(232,23,93,.3);border-radius:50%;animation:spin 1.6s linear infinite reverse}
        .emoji{font-size:2rem;animation:pulse 2s ease-in-out infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{transform:scale(.9);opacity:.8}50%{transform:scale(1.1);opacity:1}}

        /* TEXTS */
        .title{font-family:"Syne",sans-serif;font-size:1.35rem;font-weight:800;color:var(--text);
               text-align:center;line-height:1.25;animation:fadeU .5s ease .15s both}
        .sub{color:var(--muted);font-size:.88rem;text-align:center;animation:fadeU .5s ease .3s both}
        @keyframes fadeU{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

        /* DOTS */
        .dots{display:flex;gap:8px;animation:fadeU .5s ease .45s both}
        .dots span{width:9px;height:9px;background:var(--pink);border-radius:50%;animation:bnc 1.2s ease-in-out infinite}
        .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
        @keyframes bnc{0%,80%,100%{transform:scale(.65);opacity:.4}40%{transform:scale(1.2);opacity:1}}

        /* STEPS */
        .steps{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:fadeU .5s ease .6s both}
        .step{display:flex;align-items:center;gap:5px;font-size:.78rem;color:rgba(122,111,106,.45);transition:color .3s}
        .dot{width:6px;height:6px;border-radius:50%;background:var(--pink);opacity:.2;transition:all .3s}
        .step.on{color:var(--muted)}
        .step.on .dot{opacity:1;animation:blk .9s ease infinite}
        @keyframes blk{0%,100%{opacity:1}50%{opacity:.2}}

        /* PROGRESS BAR */
        .pgb-wrap{width:100%;margin-top:4px;animation:fadeU .5s ease .7s both}
        .pgb-bg{height:4px;background:var(--pink-soft);border-radius:99px;overflow:hidden}
        .pgb-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--pink),#ff6b9d);
                  border-radius:99px;animation:pgFill 3s ease-in-out both}
        @keyframes pgFill{0%{width:0%}60%{width:70%}85%{width:88%}100%{width:96%}}
    </style>
</head>
<body>

<div class="logo">NUTRIET</div>

<div class="card">
    <div class="sp-wrap">
        <div class="ring"></div>
        <div class="ring2"></div>
        <div class="emoji">🥗</div>
    </div>

    <div class="title">Generando tu dieta<br>personalizada…</div>

    <div class="dots"><span></span><span></span><span></span></div>

    <div class="sub">La IA está analizando tu perfil nutricional</div>

    <div class="steps">
        <div class="step on"><div class="dot"></div>Calculando macros</div>
        <div class="step"><div class="dot"></div>Generando plan</div>
        <div class="step"><div class="dot"></div>Finalizando</div>
    </div>

    <div class="pgb-wrap">
        <div class="pgb-bg"><div class="pgb-fill"></div></div>
    </div>
</div>

<script>
(function(){
    const steps=document.querySelectorAll(".step");
    let i=0;
    setInterval(()=>{steps.forEach(s=>s.classList.remove("on"));i=(i+1)%steps.length;steps[i].classList.add("on")},700);
})();
</script>
</body>
</html>
