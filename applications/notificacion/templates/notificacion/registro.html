<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Notificaciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .icon {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔔</div>
        <h1>Registro</h1>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" required placeholder="Tu nombre de usuario">
            </div>
            
            <div class="form-group">
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" required placeholder="tu@correo.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required placeholder="Contraseña segura">
            </div>
            
            <div class="form-group">
                <label for="password_confirm">Confirmar Contraseña:</label>
                <input type="password" id="password_confirm" name="password_confirm" required placeholder="Repite tu contraseña">
            </div>
            
            <button type="submit" class="btn">Crear Cuenta</button>
        </form>
        
        <div class="footer">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>
    <script>
        // Configuración inyectada desde settings vía context processor
        const FIREBASE_CONFIG = {{ FIREBASE_WEB_CONFIG|safe }};
        const FIREBASE_VAPID = '{{ FIREBASE_VAPID_KEY }}';

        firebase.initializeApp(FIREBASE_CONFIG);
        const messaging = firebase.messaging();

        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button[type="submit"]');
        let tokenRegistrado = false;

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function solicitarPermisoYToken() {
            try {
                const permiso = await Notification.requestPermission();
                if (permiso !== 'granted') return null;

                const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                firebase.messaging().useServiceWorker(reg);

                const currentToken = await messaging.getToken({vapidKey: FIREBASE_VAPID});
                return currentToken;
            } catch (err) {
                console.error('Error obteniendo token FCM', err);
                return null;
            }
        }

        async function enviarTokenAlServidor(token) {
            const csrftoken = getCookie('csrftoken');
            const res = await fetch('/notificaciones/registrar-token-web/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify({token_fcm: token})
            });
            return res.ok;
        }

        // Antes de enviar el formulario, aseguramos que el usuario haya autorizado y token registrado
        form.addEventListener('submit', async function(e){
            if (tokenRegistrado) return; // ya autorizado
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Solicitando permiso...';

                const token = await solicitarPermisoYToken();
                console.log('FCM token obtenido (registro):', token);
            if (!token) {
                alert('Necesitamos permiso para enviar notificaciones para continuar.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Crear Cuenta';
                return;
            }

            const ok = await enviarTokenAlServidor(token);
            console.log('Respuesta registro token (ok):', ok);
            if (ok) {
                tokenRegistrado = true;
                form.submit();
            } else {
                alert('No fue posible registrar el token. Intenta de nuevo.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Crear Cuenta';
            }
        });
    </script>
</body>
</html>
